- 修改 UI/UE 规范

工作流程：
1. 阅读 AGENTS.md、测试规范、RPC 契约规范、AG-UI 事件规范和相关 Skill。
2. 以用户路径为主线设计测试。
3. 覆盖前端、智能体微服务、RPC、业务微服务、数据库链路。
