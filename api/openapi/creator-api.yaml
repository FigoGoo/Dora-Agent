openapi: 3.0.3
info:
  title: Dora Creator Skill API
  version: '2026-07-01'
  description: Creator Portal Skill 发布、审核提交、listing、分析和结算摘要 API。
servers:
- url: /api/creator
security:
- bearerAuth: []
paths:
  /skills:
    post:
      operationId: createCreatorSkillDraft
      summary: 创建 Skill 草稿
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - description
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                required:
                - skill
                properties:
                  skill:
                    type: object
        default:
          $ref: '#/components/responses/Error'
  /skills/{skill_id}/versions/{version}/submit:
    post:
      operationId: submitCreatorSkillVersion
      summary: 提交 SkillVersion 审核
      parameters:
      - $ref: '#/components/parameters/SkillID'
      - $ref: '#/components/parameters/Version'
      - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: 提交成功
          content:
            application/json:
              schema:
                type: object
                required:
                - skill_version
                properties:
                  skill_version:
                    type: object
        default:
          $ref: '#/components/responses/Error'
  /listings:
    get:
      operationId: listCreatorListings
      summary: 查询创作者 listing
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                type: object
                required:
                - items
                properties:
                  items:
                    type: array
                    items:
                      type: object
        default:
          $ref: '#/components/responses/Error'
  /analytics/skill-usage:
    get:
      operationId: getCreatorSkillUsageAnalytics
      summary: 查询脱敏 usage 分析
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                type: object
                required:
                - usage_count
                - revenue_hold_amount
                - refund_count
                - failure_code_summary
                properties:
                  usage_count:
                    type: integer
                  revenue_hold_amount:
                    type: integer
                  refund_count:
                    type: integer
                  failure_code_summary:
                    type: object
                    additionalProperties:
                      type: integer
        default:
          $ref: '#/components/responses/Error'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        maxLength: 160
    SkillID:
      name: skill_id
      in: path
      required: true
      schema:
        type: string
    Version:
      name: version
      in: path
      required: true
      schema:
        type: string
  responses:
    Error:
      description: 错误响应
      content:
        application/json:
          schema:
            type: object
            required:
            - code
            - message
            - trace_id
            properties:
              code:
                type: string
              message:
                type: string
              trace_id:
                type: string
