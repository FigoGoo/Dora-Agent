openapi: 3.0.3
info:
  title: Dora Admin Skill Governance API
  version: '2026-07-01'
  description: 管理端 Skill 审核、listing 治理、退款和结算治理 API。
servers:
- url: /api/admin
security:
- bearerAuth: []
paths:
  /marketplace/skill-reviews:
    get:
      operationId: listAdminMarketplaceSkillReviews
      summary: 查询市场 Skill 审核单
      parameters:
      - $ref: '#/components/parameters/Status'
      - $ref: '#/components/parameters/Keyword'
      - $ref: '#/components/parameters/PageSize'
      - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: 审核单列表
          content:
            application/json:
              schema:
                type: object
                required:
                - items
                properties:
                  items:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer
        default:
          $ref: '#/components/responses/Error'
  /marketplace/listings:
    get:
      operationId: listAdminMarketplaceListings
      summary: 查询市场 Skill listing
      parameters:
      - $ref: '#/components/parameters/Status'
      - $ref: '#/components/parameters/Keyword'
      - $ref: '#/components/parameters/PageSize'
      - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: listing 列表
          content:
            application/json:
              schema:
                type: object
                required:
                - items
                properties:
                  items:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer
        default:
          $ref: '#/components/responses/Error'
  /marketplace/refund-cases:
    get:
      operationId: listAdminSkillRefundCases
      summary: 查询 Skill 使用费退款仲裁单
      parameters:
      - $ref: '#/components/parameters/Status'
      - $ref: '#/components/parameters/PageSize'
      - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: 退款仲裁单列表
          content:
            application/json:
              schema:
                type: object
                required:
                - items
                properties:
                  items:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer
        default:
          $ref: '#/components/responses/Error'
  /marketplace/settlements:
    get:
      operationId: listAdminSkillSettlements
      summary: 查询 Skill 结算 hold 和反转记录
      parameters:
      - $ref: '#/components/parameters/Status'
      - $ref: '#/components/parameters/PageSize'
      - $ref: '#/components/parameters/PageToken'
      responses:
        '200':
          description: 结算记录列表
          content:
            application/json:
              schema:
                type: object
                required:
                - items
                properties:
                  items:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer
        default:
          $ref: '#/components/responses/Error'
  /skill-reviews/{review_id}/approve:
    post:
      operationId: approveSkillReview
      summary: 审核通过 SkillVersion
      parameters:
      - $ref: '#/components/parameters/ReviewID'
      - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: 审核通过
          content:
            application/json:
              schema:
                type: object
                required:
                - skill_version
                - listing
                properties:
                  skill_version:
                    type: object
                  listing:
                    type: object
        default:
          $ref: '#/components/responses/Error'
  /listings/{listing_id}/suspend:
    post:
      operationId: suspendMarketplaceListing
      summary: 暂停 listing
      parameters:
      - $ref: '#/components/parameters/ListingID'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - reason_code
              properties:
                reason_code:
                  type: string
      responses:
        '200':
          description: 暂停成功
          content:
            application/json:
              schema:
                type: object
                required:
                - listing
                properties:
                  listing:
                    type: object
        default:
          $ref: '#/components/responses/Error'
  /refund-cases/{refund_case_id}/approve:
    post:
      operationId: approveSkillUsageRefund
      summary: 审核通过 Skill 使用费退款
      parameters:
      - $ref: '#/components/parameters/RefundCaseID'
      - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: 退款通过
          content:
            application/json:
              schema:
                type: object
                required:
                - usage
                - settlement
                properties:
                  usage:
                    type: object
                  settlement:
                    type: object
        default:
          $ref: '#/components/responses/Error'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        maxLength: 160
    ReviewID:
      name: review_id
      in: path
      required: true
      schema:
        type: string
    ListingID:
      name: listing_id
      in: path
      required: true
      schema:
        type: string
    RefundCaseID:
      name: refund_case_id
      in: path
      required: true
      schema:
        type: string
    Status:
      name: status
      in: query
      required: false
      schema:
        type: string
    Keyword:
      name: keyword
      in: query
      required: false
      schema:
        type: string
    PageSize:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
    PageToken:
      name: page_token
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
  responses:
    Error:
      description: 错误响应
      content:
        application/json:
          schema:
            type: object
            required:
            - code
            - message
            - trace_id
            properties:
              code:
                type: string
              message:
                type: string
              trace_id:
                type: string
