components:
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, maxLength: 128 }
    AdminReason:
      name: X-Admin-Reason
      in: header
      required: true
      schema: { type: string, maxLength: 512 }
    PageSize:
      name: page_size
      in: query
      schema: { type: integer, default: 10, maximum: 50 }
    PageToken:
      name: page_token
      in: query
      schema: { type: string }
    ProjectId:
      name: project_id
      in: path
      required: true
      schema: { type: string }
    SkillId:
      name: skill_id
      in: path
      required: true
      schema: { type: string }
    AssetId:
      name: asset_id
      in: path
      required: true
      schema: { type: string }
    UploadIntentId:
      name: upload_intent_id
      in: path
      required: true
      schema: { type: string }
    WorkId:
      name: work_id
      in: path
      required: true
      schema: { type: string }
    PublicWorkId:
      name: public_work_id
      in: path
      required: true
      schema: { type: string }
    NotificationId:
      name: notification_id
      in: path
      required: true
      schema: { type: string }
    MemberId:
      name: member_id
      in: path
      required: true
      schema: { type: string }
    AdminId:
      name: admin_id
      in: path
      required: true
      schema: { type: string }
    UserId:
      name: user_id
      in: path
      required: true
      schema: { type: string }
    ToolKey:
      name: tool_key
      in: path
      required: true
      schema: { type: string }
  requestBodies:
    JsonBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
  responses:
    ApiResponse:
      description: Standard API response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiResponse"
    PageResponse:
      description: Standard paginated API response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ApiResponse"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/PageResult"
  schemas:
    ApiResponse:
      type: object
      required: [success, trace_id]
      properties:
        success: { type: boolean }
        data:
          type: object
          additionalProperties: true
        error:
          $ref: "#/components/schemas/ApiError"
        trace_id: { type: string }
    ApiError:
      type: object
      required: [code, message, retryable]
      properties:
        code: { type: string }
        message: { type: string }
        retryable: { type: boolean }
        detail:
          type: object
          additionalProperties: true
    PageResult:
      type: object
      required: [items, page_size, has_more]
      properties:
        items:
          type: array
          items:
            type: object
            additionalProperties: true
        page: { type: integer }
        page_size: { type: integer, default: 10, maximum: 50 }
        total: { type: integer, format: int64 }
        next_page_token: { type: string }
        has_more: { type: boolean }
