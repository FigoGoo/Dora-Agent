openapi: 3.0.3
info:
  title: Dora Business API
  version: 2026-06-27
  description: HTTP contract for user, public, and admin business service APIs.
servers:
  - url: http://localhost:19080
tags:
  - name: Auth
  - name: Account
  - name: Enterprise
  - name: Admin
  - name: Model
  - name: Tool
  - name: Skill
  - name: Credit
  - name: Asset
  - name: Work
  - name: Public
  - name: Notification
paths:
