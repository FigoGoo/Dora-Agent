name: Regression Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  fixture-gate:
    name: Fixture gate (static)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run fixture gate
        run: python3 scripts/validate-fixtures.py

  go-test:
    name: Go regression
    runs-on: ubuntu-latest
    needs: fixture-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt dry check
        run: |
          unformatted="$(find services internal -name '*.go' -print0 | xargs -0 gofmt -l)"
          if [ -n "$unformatted" ]; then echo "$unformatted"; echo "gofmt required"; exit 1; fi

      - name: go vet
        run: go vet ./services/... ./internal/...

      - name: go test
        run: go test -count=1 ./services/... ./internal/...

  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    needs: fixture-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run frontend tests
        run: |
          npm --prefix frontend test
          npm --prefix frontend run build

  admin-frontend:
    name: Admin frontend tests
    runs-on: ubuntu-latest
    needs: fixture-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install admin frontend dependencies
        run: pnpm --dir admin_frontend install --frozen-lockfile

      - name: Run admin frontend tests
        run: |
          pnpm --dir admin_frontend test
          pnpm --dir admin_frontend build
