name: Active Contract Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  active-contract-gate:
    name: Active contract gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip -r requirements/contract-gates.txt

      - name: Validate active contracts
        run: scripts/validate-active-contracts.sh

  development-ci-gate:
    name: PR-0 CI gate
    runs-on: ubuntu-latest
    needs: active-contract-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip -r requirements/contract-gates.txt

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install admin frontend dependencies
        run: pnpm --dir admin_frontend install --frozen-lockfile

      - name: Run PR-0 CI gate
        run: scripts/validate-development-ci-gate.sh

  release-full-http-smoke:
    name: PR-5 full HTTP service smoke
    runs-on: ubuntu-latest
    needs: development-ci-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run PR-5 full HTTP service smoke
        run: scripts/validate-release-full-http-smoke.sh

  release-browser-smoke:
    name: PR-5 browser smoke
    runs-on: ubuntu-latest
    needs: release-full-http-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            tests/e2e/browser/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install admin frontend dependencies
        run: pnpm --dir admin_frontend install --frozen-lockfile

      - name: Install browser smoke dependencies
        run: npm ci --prefix tests/e2e/browser

      - name: Check Chrome
        run: google-chrome --version || google-chrome-stable --version || chromium --version || chromium-browser --version

      - name: Run PR-5 browser smoke
        run: scripts/validate-release-browser-smoke.sh
