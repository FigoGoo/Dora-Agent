services:
  pgsql:
    image: postgres:16-alpine
    container_name: doraigc-postgres
    environment:
      POSTGRES_USER: dora
      POSTGRES_PASSWORD: dora_local_password
      POSTGRES_DB: dora_agent
    ports:
      - "5432:5432"
    volumes:
      - dora_pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dora -d dora_agent"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: doraigc-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - dora_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  dora_pg_data:
  dora_redis_data:
